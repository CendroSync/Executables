name: CendrosyncP2P Multi-Platform CI/CD

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 1. Build Windows Desktop App
  build-windows:
    name: Build Windows Desktop App (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: windows-tauri/package.json

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: windows-tauri

      - name: Build Tauri Windows Executable
        run: |
          cd windows-tauri
          npm install
          npx tauri build

      - name: Upload Windows Binary Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CendrosyncP2P-Windows
          path: |
            windows-tauri/target/release/cendrosyncP2P.exe
            windows-tauri/target/release/bundle/nsis/*.exe
            windows-tauri/target/release/bundle/msi/*.msi

  # 2. Build macOS Desktop App
  build-macos:
    name: Build macOS Desktop App (.dmg / .app)
    runs-on: macos-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: windows-tauri/package.json

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: windows-tauri

      - name: Build Tauri macOS App
        run: |
          cd windows-tauri
          npm install
          npx tauri build

      - name: Upload macOS Binary Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CendrosyncP2P-macOS
          path: |
            windows-tauri/target/release/bundle/dmg/*.dmg
            windows-tauri/target/release/bundle/macos/*.app

  # 3. Build Android Mobile App
  build-android:
    name: Build Android Mobile App (.apk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: android-expo/package.json

      - name: Install Dependencies
        run: |
          cd android-expo
          npm install

      - name: Build Android Release APK
        run: |
          cd android-expo/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CendrosyncP2P-Android-APK
          path: android-expo/android/app/build/outputs/apk/release/*.apk

  # 4. Build iOS Mobile App Bundle
  build-ios:
    name: Build iOS Mobile App Bundle
    runs-on: macos-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: android-expo/package.json

      - name: Install Dependencies
        run: |
          cd android-expo
          npm install

      - name: Export iOS Bundle & Asset Package
        run: |
          cd android-expo
          npx expo export --platform ios
          zip -r ../CendrosyncP2P-iOS-Bundle.zip dist

      - name: Upload iOS Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CendrosyncP2P-iOS
          path: CendrosyncP2P-iOS-Bundle.zip

  # 5. Automatically Publish Release to GitHub Releases Tab
  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos, build-android, build-ios]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: CendrosyncP2P-Windows
          path: release-assets/windows

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: CendrosyncP2P-macOS
          path: release-assets/macos

      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: CendrosyncP2P-Android-APK
          path: release-assets/android

      - name: Download iOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: CendrosyncP2P-iOS
          path: release-assets/ios

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: CendrosyncP2P v1.0.0 Release
          body: |
            ## ⚡ CendrosyncP2P v1.0.0 Release

            Instant, encrypted local P2P clipboard synchronization across Windows, macOS, Android, and iOS.

            ### Downloads Included:
            - **Windows**: `.exe` standalone / setup installer
            - **macOS**: `.dmg` disk image
            - **Android**: `app-release.apk`
            - **iOS**: `CendrosyncP2P-iOS-Bundle.zip`
          draft: false
          prerelease: false
          files: |
            release-assets/windows/*
            release-assets/macos/*
            release-assets/android/*
            release-assets/ios/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
