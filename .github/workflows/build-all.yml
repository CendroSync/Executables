name: CendrosyncP2P Multi-Platform CI/CD

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 1. Build Windows Desktop App (.exe & .msi)
  build-windows:
    name: Build Windows Desktop App (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: windows-tauri/package.json

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: windows-tauri

      - name: Build Tauri Windows Executable
        run: |
          cd windows-tauri
          npm install
          npx tauri build

      - name: Sign Windows Executables with Authenticode
        shell: powershell
        run: |
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=Cendronyx, O=Cendronyx, C=US" -CertStoreLocation cert:\CurrentUser\My
          Get-ChildItem -Path windows-tauri/target/release -Recurse -Include *.exe,*.msi | ForEach-Object {
            Set-AuthenticodeSignature -FilePath $_.FullName -Certificate $cert -HashAlgorithm SHA256
          }

      - name: Upload Windows Binary Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CendrosyncP2P-Windows
          path: |
            windows-tauri/target/release/*.exe
            windows-tauri/target/release/bundle/nsis/*.exe
            windows-tauri/target/release/bundle/msi/*.msi

  # 2. Build macOS Desktop App (.dmg & .app)
  build-macos:
    name: Build macOS Desktop App (.dmg / .app)
    runs-on: macos-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: windows-tauri/package.json

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: windows-tauri

      - name: Build Tauri macOS App
        run: |
          cd windows-tauri
          npm install
          npx tauri build
          cd target/release/bundle/macos
          zip -r CendrosyncP2P-macOS.app.zip *.app

      - name: Upload macOS Binary Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CendrosyncP2P-macOS
          path: |
            windows-tauri/target/release/bundle/dmg/*.dmg
            windows-tauri/target/release/bundle/macos/CendrosyncP2P-macOS.app.zip

  # 3. Build Linux Desktop App (.deb & .AppImage)
  build-linux:
    name: Build Linux Desktop App (.deb / .AppImage)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install System Dependencies for Tauri
        run: |
          sudo sed -i 's|azure.archive.ubuntu.com|archive.ubuntu.com|g' /etc/apt/sources.list /etc/apt/apt-mirrors.txt 2>/dev/null || true
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout="10"
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: windows-tauri/package.json

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: windows-tauri

      - name: Build Tauri Linux Packages
        run: |
          cd windows-tauri
          npm install
          npx tauri build

      - name: Upload Linux Binary Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CendrosyncP2P-Linux
          path: |
            windows-tauri/target/release/bundle/deb/*.deb
            windows-tauri/target/release/bundle/appimage/*.AppImage

  # 4. Build Android Mobile App (.apk)
  build-android:
    name: Build Android Mobile App (.apk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: android-expo/package.json

      - name: Install Dependencies
        run: |
          cd android-expo
          npm install

      - name: Build Android Release APK
        run: |
          cd android-expo/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CendrosyncP2P-Android-APK
          path: android-expo/android/app/build/outputs/apk/**/*.apk

  # 5. Build iOS Mobile App Package
  build-ios:
    name: Build iOS Mobile App Bundle
    runs-on: macos-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: android-expo/package.json

      - name: Install Dependencies
        run: |
          cd android-expo
          npm install

      - name: Export iOS Bundle & Package
        run: |
          cd android-expo
          npx expo export --platform ios
          zip -r ../CendrosyncP2P-iOS-Package.zip dist

      - name: Upload iOS Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CendrosyncP2P-iOS
          path: CendrosyncP2P-iOS-Package.zip

  # 6. Automatically Publish All Binaries to GitHub Releases Tab
  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos, build-linux, build-android, build-ios]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - name: Download All Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Organize Clean Assets
        run: |
          mkdir -p final-assets
          find release-assets -name "*setup*.exe" -exec cp {} final-assets/CendrosyncP2P-Setup.exe \; 2>/dev/null || true
          find release-assets -name "cendrosync*.exe" ! -name "*setup*" -exec cp {} final-assets/CendrosyncP2P-Portable.exe \; 2>/dev/null || true
          find release-assets -name "*.msi" -exec cp {} final-assets/ \; 2>/dev/null || true
          find release-assets -name "*.dmg" -exec cp {} final-assets/ \; 2>/dev/null || true
          find release-assets -name "*.deb" -exec cp {} final-assets/ \; 2>/dev/null || true
          find release-assets -name "*.AppImage" -exec cp {} final-assets/ \; 2>/dev/null || true
          find release-assets -name "*arm64*.apk" -exec cp {} final-assets/CendrosyncP2P-Android.apk \; 2>/dev/null || true
          find release-assets -name "*iOS*.zip" -exec cp {} final-assets/CendrosyncP2P-iOS.zip \; 2>/dev/null || true

      - name: Publish Clean GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: |
            ## ⚡ CendrosyncP2P v1.0.0 Release

            Instant, encrypted local P2P clipboard synchronization across Windows, macOS, Linux, Android, and iOS.

            ### Included Downloads:
            - **🪟 Windows**: `CendrosyncP2P-Setup.exe` (Installer Wizard) / `CendrosyncP2P-Portable.exe`
            - **🍏 macOS**: `CendrosyncP2P.dmg`
            - **🐧 Linux**: `CendrosyncP2P.deb` / `.AppImage`
            - **🤖 Android**: `CendrosyncP2P-Android.apk` (~21.8 MB)
            - **📱 iOS**: `CendrosyncP2P-iOS.zip`
        run: |
          gh release delete v1.0.0 --cleanup-tag -y 2>/dev/null || true
          git push origin :refs/tags/v1.0.0 2>/dev/null || true
          gh release create v1.0.0 final-assets/* \
            --title "CendrosyncP2P v1.0.0 Release" \
            --notes "$RELEASE_NOTES" \
            --latest


